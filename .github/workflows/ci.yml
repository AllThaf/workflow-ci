name: Machine Learning CI Workflow

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/conda.yaml || pip install mlflow==3.13.0 scikit-learn==1.7.2 pandas==2.3.3 numpy==2.2.6

      - name: Run Model Training
        run: |
          mlflow server --backend-store-uri sqlite:///:memory: --default-artifact-root ./artifacts --host 127.0.0.1 --port 5000 &          sleep 5
          python MLProject/modelling.py

      - name: Upload MLflow Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: |
            mlruns/
            artifacts/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          mlflow models build-docker -m "mlruns/1/" -n "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest" --enable-mlserver

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest
