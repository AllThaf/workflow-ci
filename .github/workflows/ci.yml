name: Machine Learning CI Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/conda.yaml || pip install mlflow==3.13.0 scikit-learn==1.7.2 pandas==2.3.3 numpy==2.2.6

      - name: Run Model Training
        run: |
          mlflow server --backend-store-uri sqlite:///:memory: --default-artifact-root ./artifacts --host 127.0.0.1 --port 5000 &
          sleep 5
          python MLProject/modelling.py

      - name: Commit and Push Artifacts back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Tambahkan folder mlruns atau artifacts yang terbuat saat runtime
          git add mlruns/ || true
          git add artifacts/ || true

          # Lakukan commit jika ada perubahan file baru
          git commit -m "chore: automated artifact storage from CI workflow [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          mlflow models build-docker -m "mlruns/1/" -n "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest"

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest
