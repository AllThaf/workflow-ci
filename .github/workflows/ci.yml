name: Machine Learning CI Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==3.13.0 scikit-learn==1.7.2 pandas==2.3.3 numpy==2.2.6

      - name: Run Model Training
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          # Jalankan training model
          python MLProject/modelling.py

      - name: Prepare Model Directory for Docker
        run: |
          mkdir -p extracted_model
          # Cari file MLmodel dan salin seluruh isi folder induknya ke 'extracted_model'
          MODEL_PATH=$(find . -name "MLmodel" -exec dirname {} \; | head -1)
          echo "Model ditemukan di: $MODEL_PATH"
          cp -r $MODEL_PATH/* extracted_model/
          ls -la extracted_model/ # Untuk memastikan file MLmodel benar-benar ada di sini

      - name: Commit and Push Artifacts back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mlruns/ || true
          git commit -m "chore: automated artifact storage from CI workflow [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          echo "Membangun docker dari folder terisolasi: extracted_model"
          mlflow models build-docker -m "extracted_model" -n "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest"

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease:latest
